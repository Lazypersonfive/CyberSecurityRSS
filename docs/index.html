<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日科技情报</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --ink: #16201b;
      --muted: #647067;
      --paper: #f4efe4;
      --paper-2: #fffaf0;
      --line: rgba(22, 32, 27, 0.16);
      --accent: #d85f2d;
      --accent-2: #0f766e;
      --card: rgba(255, 250, 240, 0.82);
      --shadow: 0 24px 80px rgba(58, 42, 22, 0.16);
    }
    .dark {
      --ink: #f5f0e5;
      --muted: #aeb7ad;
      --paper: #101613;
      --paper-2: #16201b;
      --line: rgba(245, 240, 229, 0.14);
      --accent: #ff8a4c;
      --accent-2: #5eead4;
      --card: rgba(22, 32, 27, 0.82);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
    }
    @font-face { font-family: "NewsreaderLocal"; font-display: swap; src: local("Iowan Old Style"), local("Georgia"); }
    @font-face { font-family: "MonoLocal"; font-display: swap; src: local("SF Mono"), local("Menlo"); }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      color: var(--ink);
      font-family: NewsreaderLocal, "Noto Serif SC", "Songti SC", Georgia, serif;
      background:
        radial-gradient(circle at 8% 0%, rgba(216, 95, 45, 0.20), transparent 30rem),
        radial-gradient(circle at 92% 6%, rgba(15, 118, 110, 0.18), transparent 28rem),
        linear-gradient(135deg, var(--paper), var(--paper-2));
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.28;
      background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: linear-gradient(to bottom, black, transparent 72%);
    }
    .mono { font-family: MonoLocal, ui-monospace, monospace; }
    .shell { position: relative; z-index: 1; }
    .glass {
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .masthead-title { letter-spacing: -0.075em; line-height: 0.92; }
    .control {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.28);
      color: var(--ink);
      outline: none;
    }
    .control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(216, 95, 45, 0.16); }
    .tab-btn { border: 1px solid var(--line); background: rgba(255,255,255,0.24); color: var(--muted); }
    .tab-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .card { transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
    .card:hover { transform: translateY(-3px); border-color: rgba(216, 95, 45, 0.45); }
    .tag { border: 1px solid var(--line); background: rgba(255,255,255,0.28); }
    .date-rule { border-top: 1px solid var(--line); }
    @media (max-width: 720px) { .masthead-title { letter-spacing: -0.045em; } }
  </style>
</head>
<body>
<div class="shell max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-10">
  <header class="glass rounded-[2rem] p-5 sm:p-8 overflow-hidden relative">
    <div class="absolute right-6 top-6 mono text-[10px] uppercase tracking-[0.3em] text-[color:var(--muted)]">RSS Intelligence</div>
    <div class="grid lg:grid-cols-[1.1fr_0.9fr] gap-8 items-end pt-8">
      <div>
        <p class="mono text-xs uppercase tracking-[0.34em] text-[color:var(--accent)] mb-4">Daily Brief</p>
        <h1 class="masthead-title text-5xl sm:text-7xl md:text-8xl font-black">每日科技情报</h1>
        <p class="mt-5 text-base sm:text-lg text-[color:var(--muted)] max-w-2xl">安全 · AI安全 · AI · 金融科技 — LLM 精选日报</p>
      </div>
      <div class="space-y-3">
        <div class="relative">
          <input id="search" type="search" placeholder="跨日期搜索标题、摘要、标签、CVE" autocomplete="off"
                 class="control w-full rounded-2xl px-4 py-3 pr-12 text-sm" />
          <button id="search-clear" aria-label="清空搜索" type="button"
                  class="hidden absolute right-3 top-1/2 -translate-y-1/2 mono text-xs px-2 py-1 rounded-full tag">清空</button>
        </div>
        <div class="flex gap-3">
          <select id="date-select" class="control rounded-2xl px-4 py-3 text-sm flex-1"></select>
          <button id="theme-toggle" aria-label="切换主题" class="control rounded-2xl px-4 py-3 mono text-xs">明/暗</button>
        </div>
        <p id="search-scope" class="mono text-[11px] text-[color:var(--muted)]">无搜索时浏览单日；输入关键词后搜索全部已生成日期。</p>
      </div>
    </div>
  </header>

  <main class="mt-6 grid lg:grid-cols-[220px_1fr] gap-6 items-start">
    <aside class="glass rounded-[1.5rem] p-3 sticky top-4">
      <nav class="flex lg:flex-col gap-2 overflow-x-auto" id="tabs"></nav>
      <p id="meta" class="mono mt-4 px-2 text-[11px] leading-relaxed text-[color:var(--muted)]"></p>
    </aside>
    <section id="feed-body" class="space-y-5"></section>
  </main>

  <footer class="mt-10 pb-8 mono text-[11px] text-[color:var(--muted)] flex flex-wrap gap-2 justify-between">
    <span>自动生成，数据来自各源 RSS，版权归原作者所有。</span>
    <a href="https://github.com/anthropics/claude-code" class="underline" target="_blank" rel="noopener">Powered by Claude</a>
  </footer>
</div>

<script>
const BOARDS = {"security": {"display_name": "安全"}, "ai_security": {"display_name": "AI 安全"}, "ai": {"display_name": "AI 前沿"}, "finance": {"display_name": "金融科技"}};
const BOARD_ORDER = ["security", "ai_security", "ai", "finance"];
const DATES = ["2026-05-06", "2026-05-05", "2026-05-04", "2026-05-03", "2026-05-02", "2026-05-01", "2026-04-30"];

let currentBoard = BOARD_ORDER[0];
let currentDate = DATES[0];
let feed = null;
let allFeeds = {};
let searchQuery = '';

function fmtDate(iso) { return (iso || '').replace(/-/g, '/'); }
function fmtTime(iso) {
  if (!iso) return '';
  try {
    return new Date(iso).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  } catch (e) { return ''; }
}
function safeUrl(raw) {
  try {
    const url = new URL(raw || '', window.location.href);
    return ['http:', 'https:'].includes(url.protocol) ? url.href : '#';
  } catch (e) { return '#'; }
}
function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text !== undefined && text !== null) node.textContent = text;
  return node;
}
function matchesQuery(item, query) {
  if (!query) return true;
  const haystack = [item.title_zh, item.title_orig, item.summary, item.source, ...(item.tags || []), ...(item.cve_ids || [])]
    .filter(Boolean).join(' ').toLowerCase();
  return haystack.includes(query.toLowerCase());
}
function boardBlock(boardKey, dateKey) { return allFeeds[dateKey]?.boards?.[boardKey] || null; }
function itemsForBoard(boardKey) {
  const dateKeys = searchQuery ? DATES : [currentDate];
  return dateKeys.flatMap(dateKey => {
    const block = boardBlock(boardKey, dateKey);
    return (block?.items || []).filter(it => matchesQuery(it, searchQuery)).map(it => ({ ...it, _date: dateKey, _block: block }));
  });
}
function totalForBoard(boardKey) {
  const dateKeys = searchQuery ? DATES : [currentDate];
  return dateKeys.reduce((sum, dateKey) => sum + (boardBlock(boardKey, dateKey)?.items?.length || 0), 0);
}
function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.textContent = '';
  BOARD_ORDER.forEach(boardKey => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn rounded-2xl px-4 py-3 text-left text-sm transition min-w-fit';
    const matching = itemsForBoard(boardKey).length;
    const total = totalForBoard(boardKey);
    btn.append(el('span', 'block font-bold', BOARDS[boardKey].display_name));
    btn.append(el('span', 'mono block text-[11px] opacity-70 mt-1', searchQuery ? `${matching}/${total} 匹配` : `${total} 条`));
    if (boardKey === currentBoard) btn.classList.add('active');
    btn.addEventListener('click', () => { currentBoard = boardKey; renderAll(); });
    tabs.appendChild(btn);
  });
}
function makeTagPill(text, kind) {
  const cls = kind === 'cve'
    ? 'tag mono text-[11px] px-2 py-1 rounded-full text-[color:var(--accent)] cursor-pointer'
    : 'tag mono text-[11px] px-2 py-1 rounded-full text-[color:var(--muted)] cursor-pointer';
  const pill = el('span', cls, text);
  pill.title = `点击筛选 "${text}"`;
  pill.addEventListener('click', () => applySearch(text));
  return pill;
}
function renderCard(item) {
  const card = document.createElement('article');
  card.className = 'card glass rounded-[1.5rem] p-5 sm:p-6';
  const top = el('div', 'flex flex-wrap items-center gap-2 mono text-[11px] text-[color:var(--muted)] mb-3');
  top.append(el('span', 'text-[color:var(--accent)]', fmtDate(item._date || currentDate)));
  top.append(el('span', '', item.source || ''));
  top.append(el('span', '', fmtTime(item.published)));
  card.append(top);

  const heading = el('h2', 'text-xl sm:text-2xl font-black leading-tight');
  const link = el('a', 'hover:text-[color:var(--accent)] transition-colors', item.title_zh || item.title_orig || '');
  link.href = safeUrl(item.url); link.target = '_blank'; link.rel = 'noopener';
  heading.append(link); card.append(heading);
  if (item.title_zh && item.title_orig && item.title_zh !== item.title_orig) card.append(el('p', 'mt-2 mono text-[11px] text-[color:var(--muted)]', item.title_orig));

  const detail = el('div', 'flex flex-wrap items-center gap-2 mt-4');
  (item.tags || []).forEach(t => detail.append(makeTagPill(t, 'tag')));
  (item.cve_ids || []).forEach(c => detail.append(makeTagPill(c, 'cve')));
  card.append(detail);
  card.append(el('p', 'mt-4 text-[15px] sm:text-base leading-8 text-[color:var(--ink)]', item.summary || ''));
  return card;
}
function renderBody() {
  const body = document.getElementById('feed-body');
  const meta = document.getElementById('meta');
  body.textContent = '';
  const items = itemsForBoard(currentBoard);
  const total = totalForBoard(currentBoard);
  document.getElementById('search-scope').textContent = searchQuery
    ? `正在跨 ${DATES.length} 个日期搜索：“${searchQuery}”`
    : `当前日期：${fmtDate(currentDate)}。输入关键词后搜索全部已生成日期。`;
  if (!items.length) {
    body.append(el('p', 'glass rounded-[1.5rem] p-10 text-center text-[color:var(--muted)]', searchQuery ? `没有匹配“${searchQuery}”的条目。` : `该日期 ${fmtDate(currentDate)} 的 ${BOARDS[currentBoard].display_name} 板块暂无内容。`));
    meta.textContent = searchQuery ? `0/${total} 匹配` : '暂无内容';
    return;
  }
  let lastDate = '';
  items.forEach(item => {
    if (searchQuery && item._date !== lastDate) {
      const label = el('div', 'date-rule pt-5 mono text-xs uppercase tracking-[0.24em] text-[color:var(--muted)]', fmtDate(item._date));
      body.append(label);
      lastDate = item._date;
    }
    body.append(renderCard(item));
  });
  const currentBlock = boardBlock(currentBoard, currentDate);
  meta.textContent = searchQuery
    ? `${items.length}/${total} 条匹配 · 覆盖 ${DATES.length} 日`
    : `共 ${total} 条 · 原始抓取 ${currentBlock?.raw_count || 0} 条 · 生成于 ${fmtTime(currentBlock?.generated_at || '')}`;
}
function renderDateSelect() {
  const sel = document.getElementById('date-select');
  sel.textContent = '';
  DATES.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = fmtDate(d); opt.selected = d === currentDate;
    sel.append(opt);
  });
  sel.addEventListener('change', e => { currentDate = e.target.value; feed = allFeeds[currentDate]; renderAll(); });
}
async function loadOneFeed(dateKey) {
  const res = await fetch(`feed_${dateKey}.json`, { cache: 'no-cache' });
  if (!res.ok) throw new Error(`feed_${dateKey}.json ${res.status}`);
  return res.json();
}
async function loadAllFeeds() {
  const pairs = await Promise.all(DATES.map(async d => [d, await loadOneFeed(d)]));
  allFeeds = Object.fromEntries(pairs);
  feed = allFeeds[currentDate];
  const hasContent = b => (boardBlock(b, currentDate)?.items?.length || 0) > 0;
  if (!hasContent(currentBoard)) currentBoard = BOARD_ORDER.find(hasContent) || currentBoard;
  renderAll();
}
function renderAll() { renderTabs(); renderBody(); }

const themeBtn = document.getElementById('theme-toggle');
const storedTheme = localStorage.getItem('theme');
if (storedTheme === 'dark' || (!storedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');
themeBtn.addEventListener('click', () => {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
});
const searchInput = document.getElementById('search');
const searchClear = document.getElementById('search-clear');
function applySearch(value) {
  searchQuery = (value || '').trim();
  searchInput.value = searchQuery;
  searchClear.classList.toggle('hidden', !searchQuery);
  renderAll();
}
searchInput.addEventListener('input', e => applySearch(e.target.value));
searchClear.addEventListener('click', () => applySearch(''));

renderDateSelect();
loadAllFeeds().catch(err => {
  document.getElementById('feed-body').append(el('p', 'glass rounded-[1.5rem] p-10 text-center text-[color:var(--muted)]', `加载失败：${err.message}`));
});
</script>
</body>
</html>
