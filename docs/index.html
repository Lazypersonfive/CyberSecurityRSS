<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日科技情报</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'PingFang SC', 'Helvetica Neue', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    .card:hover { transform: translateY(-1px); }
    .tab-btn.active { background-color: rgb(15 23 42); color: white; }
    .dark .tab-btn.active { background-color: rgb(226 232 240); color: rgb(15 23 42); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 font-sans">

<header class="border-b border-slate-200 dark:border-slate-800">
  <div class="max-w-5xl mx-auto px-4 py-6 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold tracking-tight">每日科技情报</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">安全 · AI · 金融科技 — LLM 精选日报</p>
    </div>
    <div class="flex items-center gap-3">
      <div class="relative">
        <input id="search" type="search" placeholder="搜索标题 / 摘要 / 标签" autocomplete="off"
               class="text-sm bg-transparent border border-slate-300 dark:border-slate-700 rounded pl-2 pr-7 py-1 w-44 sm:w-56" />
        <button id="search-clear" aria-label="清空搜索" type="button"
                class="hidden absolute right-1 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 text-sm leading-none px-1">✕</button>
      </div>
      <select id="date-select" class="text-sm bg-transparent border border-slate-300 dark:border-slate-700 rounded px-2 py-1"></select>
      <button id="theme-toggle" aria-label="toggle theme" class="text-lg px-2 py-1 border border-slate-300 dark:border-slate-700 rounded">🌓</button>
    </div>
  </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-6">
  <nav class="flex gap-2 mb-6 flex-wrap" id="tabs"></nav>
  <section id="feed-body" class="space-y-4"></section>
  <p id="meta" class="mt-8 text-xs text-slate-400"></p>
</main>

<footer class="max-w-5xl mx-auto px-4 py-8 text-xs text-slate-400 border-t border-slate-200 dark:border-slate-800">
  自动生成 · <a href="https://github.com/anthropics/claude-code" class="underline" target="_blank" rel="noopener">Powered by Claude</a> · 数据来自各源 RSS，版权归原作者所有。
</footer>

<script>
const BOARDS = {"security": {"display_name": "安全"}, "ai": {"display_name": "AI 前沿"}, "finance": {"display_name": "金融科技"}};
const BOARD_ORDER = ["security", "ai", "finance"];
const DATES = ["2026-05-02", "2026-05-01", "2026-04-30", "2026-04-29", "2026-04-28", "2026-04-27", "2026-04-26"];

let currentBoard = BOARD_ORDER[0];
let currentDate = DATES[0];
let feed = null;
let searchQuery = '';

function fmtDate(iso) {
  return iso.replace(/-/g, '/');
}

function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  } catch (e) { return ''; }
}

function safeUrl(raw) {
  try {
    const url = new URL(raw || '', window.location.href);
    return ['http:', 'https:'].includes(url.protocol) ? url.href : '#';
  } catch (e) {
    return '#';
  }
}

function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text !== undefined && text !== null) node.textContent = text;
  return node;
}

function matchesQuery(item, query) {
  if (!query) return true;
  const haystack = [
    item.title_zh, item.title_orig, item.summary, item.source,
    ...(item.tags || []), ...(item.cve_ids || []),
  ].filter(Boolean).join(' ').toLowerCase();
  return haystack.includes(query.toLowerCase());
}

function visibleItems(boardKey) {
  const items = feed?.boards?.[boardKey]?.items || [];
  return items.filter(it => matchesQuery(it, searchQuery));
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  BOARD_ORDER.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 transition';
    const total = feed?.boards?.[b]?.items?.length || 0;
    const matching = visibleItems(b).length;
    const label = searchQuery ? `${matching}/${total}` : `${total}`;
    btn.append(document.createTextNode(BOARDS[b].display_name + ' '));
    btn.appendChild(el('span', 'ml-1 text-xs opacity-60', label));
    if (b === currentBoard) btn.classList.add('active');
    btn.addEventListener('click', () => { currentBoard = b; renderAll(); });
    tabs.appendChild(btn);
  });
}

function makeTagPill(text, kind) {
  const baseClass = kind === 'cve'
    ? 'text-xs px-2 py-0.5 rounded bg-rose-100 dark:bg-rose-900/40 text-rose-700 dark:text-rose-300 font-mono'
    : 'text-xs px-2 py-0.5 rounded bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300';
  const span = el('span', baseClass + ' cursor-pointer hover:bg-slate-200 dark:hover:bg-slate-700', text);
  span.title = `点击筛选 "${text}"`;
  span.addEventListener('click', () => applySearch(text));
  return span;
}

function renderBody() {
  const body = document.getElementById('feed-body');
  const meta = document.getElementById('meta');
  const block = feed?.boards?.[currentBoard];
  body.innerHTML = '';
  if (!block || !block.items?.length) {
    body.appendChild(el('p', 'text-center text-slate-500 py-12', `该日期 ${fmtDate(currentDate)} 的 ${BOARDS[currentBoard].display_name} 板块暂无内容。`));
    meta.textContent = '';
    return;
  }
  const filtered = visibleItems(currentBoard);
  if (!filtered.length) {
    body.appendChild(el('p', 'text-center text-slate-500 py-12', `没有匹配 "${searchQuery}" 的条目。`));
    meta.textContent = `共 ${block.items.length} 条 · 0 条匹配当前搜索`;
    return;
  }
  filtered.forEach(it => {
    const card = document.createElement('article');
    card.className = 'card bg-white dark:bg-slate-900 rounded-xl p-5 border border-slate-200 dark:border-slate-800 transition shadow-sm hover:shadow';

    const heading = el('h2', 'text-lg font-semibold leading-snug');
    const link = el('a', 'hover:underline', it.title_zh || it.title_orig || '');
    link.href = safeUrl(it.url);
    link.target = '_blank';
    link.rel = 'noopener';
    heading.appendChild(link);
    card.appendChild(heading);

    if (it.title_zh && it.title_orig && it.title_zh !== it.title_orig) {
      card.appendChild(el('p', 'text-xs text-slate-400 mt-0.5', it.title_orig));
    }

    const detail = el('div', 'flex flex-wrap items-center gap-2 text-xs text-slate-500 mt-2');
    detail.appendChild(el('span', 'font-medium', it.source || ''));
    detail.appendChild(el('span', '', fmtTime(it.published)));
    (it.tags || []).forEach(t => detail.appendChild(makeTagPill(t, 'tag')));
    (it.cve_ids || []).forEach(c => detail.appendChild(makeTagPill(c, 'cve')));
    card.appendChild(detail);

    card.appendChild(el('p', 'mt-3 text-sm leading-relaxed text-slate-700 dark:text-slate-300', it.summary || ''));
    body.appendChild(card);
  });
  const matchSuffix = searchQuery ? ` · 匹配 ${filtered.length}/${block.items.length}` : '';
  meta.textContent = `共 ${block.items.length} 条${matchSuffix} · 原始抓取 ${block.raw_count || 0} 条 · 生成于 ${fmtTime(block.generated_at || '')}`;
}

function renderDateSelect() {
  const sel = document.getElementById('date-select');
  sel.innerHTML = '';
  DATES.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = fmtDate(d);
    if (d === currentDate) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', e => { currentDate = e.target.value; loadFeed(); });
}

async function loadFeed() {
  const res = await fetch(`feed_${currentDate}.json`, { cache: 'no-cache' });
  feed = await res.json();
  // If currentBoard has no content on this date, switch to first board that does.
  const hasContent = (b) => (feed?.boards?.[b]?.items?.length || 0) > 0;
  if (!hasContent(currentBoard)) {
    const firstWithContent = BOARD_ORDER.find(hasContent);
    if (firstWithContent) currentBoard = firstWithContent;
  }
  renderAll();
}

function renderAll() {
  renderTabs();
  renderBody();
}

// theme
const themeBtn = document.getElementById('theme-toggle');
const storedTheme = localStorage.getItem('theme');
if (storedTheme === 'dark' || (!storedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
  document.documentElement.classList.add('dark');
}
themeBtn.addEventListener('click', () => {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
});

// search
const searchInput = document.getElementById('search');
const searchClear = document.getElementById('search-clear');
function applySearch(value) {
  searchQuery = (value || '').trim();
  searchInput.value = searchQuery;
  searchClear.classList.toggle('hidden', !searchQuery);
  renderAll();
}
searchInput.addEventListener('input', e => applySearch(e.target.value));
searchClear.addEventListener('click', () => applySearch(''));

renderDateSelect();
loadFeed();
</script>
</body>
</html>
