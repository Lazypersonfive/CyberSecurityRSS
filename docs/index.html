<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日科技情报</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #0d0d0d;
      --muted: #6f6f6f;
      --subtle: #f5f5f5;
      --line: #e3e3e3;
      --line-strong: #c7c7c7;
      --surface: #ffffff;
      --surface-soft: #f7f7f7;
      --accent: #111111;
      --radius-xl: 28px;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
    }
    .dark {
      --bg: #050505;
      --fg: #f7f7f7;
      --muted: #a1a1a1;
      --subtle: #111111;
      --line: #242424;
      --line-strong: #3a3a3a;
      --surface: #0b0b0b;
      --surface-soft: #141414;
      --accent: #ffffff;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.34);
    }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      text-rendering: geometricPrecision;
    }
    .mono { font-family: "SF Mono", Menlo, ui-monospace, monospace; }
    .oai-shell { min-height: 100vh; }
    .oai-nav {
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(18px);
    }
    .oai-hero { border-bottom: 1px solid var(--line); background: var(--surface); }
    .oai-title { letter-spacing: -0.035em; line-height: 1.08; }
    .oai-search {
      border: 1px solid var(--line-strong);
      background: var(--surface);
      box-shadow: var(--shadow);
    }
    .control {
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--fg);
      outline: none;
    }
    .control:focus { border-color: var(--line-strong); background: var(--surface); }
    .tab-btn {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
    }
    .tab-btn.active {
      background: var(--fg);
      color: var(--bg);
      border-color: var(--fg);
    }
    .oai-card {
      border: 1px solid var(--line);
      background: var(--surface);
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .oai-card:hover {
      transform: translateY(-2px);
      border-color: var(--line-strong);
      box-shadow: var(--shadow);
    }
    .tag {
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--muted);
    }
    .source-badge {
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--muted);
    }
    .source-badge[data-tier="t1"] { border-color: #166534; color: #166534; background: #f0fdf4; }
    .source-badge[data-tier="t1_5"] { border-color: #1d4ed8; color: #1d4ed8; background: #eff6ff; }
    .source-badge[data-kind="google_news"],
    .source-badge[data-kind="aggregator"],
    .source-badge[data-kind="community"] { border-color: #a16207; color: #854d0e; background: #fefce8; }
    .dark .source-badge[data-tier="t1"] { border-color: #22c55e; color: #86efac; background: rgba(34, 197, 94, 0.10); }
    .dark .source-badge[data-tier="t1_5"] { border-color: #60a5fa; color: #93c5fd; background: rgba(59, 130, 246, 0.12); }
    .dark .source-badge[data-kind="google_news"],
    .dark .source-badge[data-kind="aggregator"],
    .dark .source-badge[data-kind="community"] { border-color: #facc15; color: #fde68a; background: rgba(250, 204, 21, 0.10); }
    .date-rule { border-top: 1px solid var(--line); }
    @media (max-width: 720px) {
      .oai-title { letter-spacing: -0.025em; }
    }
  </style>
</head>
<body>
<div class="oai-shell">
  <nav class="oai-nav sticky top-0 z-20">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 min-w-0">
        <div class="w-7 h-7 rounded-full border border-[color:var(--fg)] grid place-items-center text-xs font-semibold">O</div>
        <span class="font-semibold truncate">每日科技情报</span>
      </div>
      <div class="hidden md:flex items-center gap-6 text-sm text-[color:var(--muted)]">
        <span>Docs</span><span>Guides</span><span>Boards</span><span>Archive</span>
      </div>
      <button id="theme-toggle" aria-label="切换主题" class="control rounded-full px-4 py-2 text-sm">明/暗</button>
    </div>
  </nav>

  <header class="oai-hero">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8 sm:py-10">
      <div class="max-w-3xl">
        <p class="text-sm text-[color:var(--muted)] mb-5">Docs / Daily intelligence</p>
        <h1 class="oai-title text-3xl sm:text-4xl lg:text-5xl font-semibold">每日科技情报</h1>
        <p class="mt-4 text-base text-[color:var(--muted)] max-w-2xl leading-7">安全 · AI安全 · AI · 金融科技 — LLM 精选日报</p>
      </div>
      <div class="oai-search mt-7 rounded-2xl p-2 sm:p-3 max-w-3xl">
        <div class="flex flex-col md:flex-row gap-3">
          <div class="relative flex-1">
            <input id="search" type="search" placeholder="搜索全部日期的标题、摘要、标签、CVE" autocomplete="off"
                   class="w-full rounded-xl bg-transparent px-4 py-3 pr-16 text-sm outline-none" />
            <button id="search-clear" aria-label="清空搜索" type="button"
                    class="hidden absolute right-3 top-1/2 -translate-y-1/2 rounded-full px-3 py-1 text-sm bg-[color:var(--surface-soft)] text-[color:var(--muted)]">清空</button>
          </div>
          <select id="date-select" class="control rounded-xl px-4 py-3 text-sm md:w-44"></select>
        </div>
        <p id="search-scope" class="px-2 pt-2 text-xs sm:text-sm text-[color:var(--muted)]">无搜索时浏览单日；输入关键词后搜索全部已生成日期。</p>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
    <div class="grid lg:grid-cols-[220px_minmax(0,1fr)] gap-6 lg:gap-10 items-start">
      <aside class="lg:sticky lg:top-20 space-y-4">
        <nav class="flex lg:flex-col gap-2 overflow-x-auto" id="tabs"></nav>
        <p id="meta" class="mono text-xs leading-relaxed text-[color:var(--muted)]"></p>
      </aside>
      <section id="feed-body" class="grid gap-4"></section>
    </div>
  </main>

  <footer class="max-w-6xl mx-auto px-4 sm:px-6 py-8 border-t border-[color:var(--line)] text-sm text-[color:var(--muted)] flex flex-wrap justify-between gap-3">
    <span>自动生成，数据来自各源 RSS，版权归原作者所有。</span>
    <a href="https://openai.com/" class="underline" target="_blank" rel="noopener">OpenAI-inspired interface</a>
  </footer>
</div>

<script>
const BOARDS = {"security": {"display_name": "安全"}, "ai_security": {"display_name": "AI 安全"}, "ai": {"display_name": "AI 前沿"}, "finance": {"display_name": "金融科技"}};
const BOARD_ORDER = ["security", "ai_security", "ai", "finance"];
const DATES = ["2026-05-12", "2026-05-11", "2026-05-10", "2026-05-09", "2026-05-08", "2026-05-07", "2026-05-06"];

let currentBoard = BOARD_ORDER[0];
let currentDate = DATES[0];
let feed = null;
let allFeeds = {};
let searchQuery = '';

function fmtDate(iso) { return (iso || '').replace(/-/g, '/'); }
function fmtTime(iso) {
  if (!iso) return '';
  try {
    return new Date(iso).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  } catch (e) { return ''; }
}
function safeUrl(raw) {
  try {
    const url = new URL(raw || '', window.location.href);
    return ['http:', 'https:'].includes(url.protocol) ? url.href : '#';
  } catch (e) { return '#'; }
}
function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text !== undefined && text !== null) node.textContent = text;
  return node;
}
function matchesQuery(item, query) {
  if (!query) return true;
  const haystack = [item.title_zh, item.title_orig, item.summary, item.source, item.source_label, item.source_kind, item.source_tier, ...(item.tags || []), ...(item.cve_ids || [])]
    .filter(Boolean).join(' ').toLowerCase();
  return haystack.includes(query.toLowerCase());
}
function boardBlock(boardKey, dateKey) { return allFeeds[dateKey]?.boards?.[boardKey] || null; }
function itemsForBoard(boardKey) {
  const dateKeys = searchQuery ? DATES : [currentDate];
  return dateKeys.flatMap(dateKey => {
    const block = boardBlock(boardKey, dateKey);
    return (block?.items || []).filter(it => matchesQuery(it, searchQuery)).map(it => ({ ...it, _date: dateKey, _block: block }));
  });
}
function totalForBoard(boardKey) {
  const dateKeys = searchQuery ? DATES : [currentDate];
  return dateKeys.reduce((sum, dateKey) => sum + (boardBlock(boardKey, dateKey)?.items?.length || 0), 0);
}
function sourceMixLine(stats) {
  if (!stats) return '';
  const parts = [];
  if (stats.tier_t1) parts.push(`T1 ${stats.tier_t1}`);
  if (stats.tier_t1_5) parts.push(`T1.5 ${stats.tier_t1_5}`);
  if (stats.tier_t2) parts.push(`T2 ${stats.tier_t2}`);
  if (stats.tier_unknown) parts.push(`未登记 ${stats.tier_unknown}`);
  if (stats.google_news) parts.push(`GN ${stats.google_news}`);
  return parts.length ? ` · 来源 ${parts.join(' / ')}` : '';
}
function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.textContent = '';
  BOARD_ORDER.forEach(boardKey => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn rounded-full px-4 py-3 text-left text-sm transition min-w-fit';
    const matching = itemsForBoard(boardKey).length;
    const total = totalForBoard(boardKey);
    btn.append(el('span', 'block font-bold', BOARDS[boardKey].display_name));
    btn.append(el('span', 'mono block text-[11px] opacity-70 mt-1', searchQuery ? `${matching}/${total} 匹配` : `${total} 条`));
    if (boardKey === currentBoard) btn.classList.add('active');
    btn.addEventListener('click', () => { currentBoard = boardKey; renderAll(); });
    tabs.appendChild(btn);
  });
}
function sourceBadge(item) {
  const tier = item.source_tier || 'unknown';
  const kind = item.source_kind || 'media';
  const label = item.source_label || (kind === 'google_news' ? 'Google News' : '未登记源');
  const badge = el('span', 'source-badge mono text-[11px] px-2.5 py-1 rounded-full', `${label} · ${tier}`);
  badge.dataset.tier = tier;
  badge.dataset.kind = kind;
  badge.title = `source_tier=${tier} · source_kind=${kind}`;
  return badge;
}

function makeTagPill(text, kind) {
  const cls = kind === 'cve'
    ? 'tag mono text-[11px] px-2 py-1 rounded-full cursor-pointer'
    : 'tag mono text-[11px] px-2 py-1 rounded-full cursor-pointer';
  const pill = el('span', cls, text);
  pill.title = `点击筛选 "${text}"`;
  pill.addEventListener('click', () => applySearch(text));
  return pill;
}
function renderCard(item) {
  const card = document.createElement('article');
  card.className = 'oai-card rounded-3xl p-5 sm:p-6';
  const top = el('div', 'flex flex-wrap items-center gap-2 mono text-xs text-[color:var(--muted)] mb-4');
  top.append(el('span', 'text-[color:var(--fg)]', fmtDate(item._date || currentDate)));
  top.append(sourceBadge(item));
  top.append(el('span', '', item.source || ''));
  top.append(el('span', '', fmtTime(item.published)));
  card.append(top);

  const heading = el('h2', 'text-xl sm:text-2xl font-semibold leading-tight tracking-[-0.02em]');
  const link = el('a', 'hover:underline underline-offset-4 transition-colors', item.title_zh || item.title_orig || '');
  link.href = safeUrl(item.url); link.target = '_blank'; link.rel = 'noopener';
  heading.append(link); card.append(heading);
  if (item.title_zh && item.title_orig && item.title_zh !== item.title_orig) card.append(el('p', 'mt-2 mono text-[11px] text-[color:var(--muted)]', item.title_orig));

  const detail = el('div', 'flex flex-wrap items-center gap-2 mt-4');
  (item.tags || []).forEach(t => detail.append(makeTagPill(t, 'tag')));
  (item.cve_ids || []).forEach(c => detail.append(makeTagPill(c, 'cve')));
  card.append(detail);
  card.append(el('p', 'mt-4 text-[15px] sm:text-base leading-8 text-[color:var(--fg)]', item.summary || ''));
  return card;
}
function renderBody() {
  const body = document.getElementById('feed-body');
  const meta = document.getElementById('meta');
  body.textContent = '';
  const items = itemsForBoard(currentBoard);
  const total = totalForBoard(currentBoard);
  document.getElementById('search-scope').textContent = searchQuery
    ? `正在跨 ${DATES.length} 个日期搜索：“${searchQuery}”`
    : `当前日期：${fmtDate(currentDate)}。输入关键词后搜索全部已生成日期。`;
  if (!items.length) {
    body.append(el('p', 'oai-card rounded-3xl p-10 text-center text-[color:var(--muted)]', searchQuery ? `没有匹配“${searchQuery}”的条目。` : `该日期 ${fmtDate(currentDate)} 的 ${BOARDS[currentBoard].display_name} 板块暂无内容。`));
    meta.textContent = searchQuery ? `0/${total} 匹配` : '暂无内容';
    return;
  }
  let lastDate = '';
  items.forEach(item => {
    if (searchQuery && item._date !== lastDate) {
      const label = el('div', 'date-rule pt-5 mono text-xs uppercase tracking-[0.24em] text-[color:var(--muted)]', fmtDate(item._date));
      body.append(label);
      lastDate = item._date;
    }
    body.append(renderCard(item));
  });
  const currentBlock = boardBlock(currentBoard, currentDate);
  meta.textContent = searchQuery
    ? `${items.length}/${total} 条匹配 · 覆盖 ${DATES.length} 日`
    : `共 ${total} 条 · 原始抓取 ${currentBlock?.raw_count || 0} 条 · 生成于 ${fmtTime(currentBlock?.generated_at || '')}${sourceMixLine(currentBlock?.selection_stats)}`;
}
function renderDateSelect() {
  const sel = document.getElementById('date-select');
  sel.textContent = '';
  DATES.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = fmtDate(d); opt.selected = d === currentDate;
    sel.append(opt);
  });
  sel.addEventListener('change', e => { currentDate = e.target.value; feed = allFeeds[currentDate]; renderAll(); });
}
async function loadOneFeed(dateKey) {
  const res = await fetch(`feed_${dateKey}.json`, { cache: 'no-cache' });
  if (!res.ok) throw new Error(`feed_${dateKey}.json ${res.status}`);
  return res.json();
}
async function loadAllFeeds() {
  const pairs = await Promise.all(DATES.map(async d => [d, await loadOneFeed(d)]));
  allFeeds = Object.fromEntries(pairs);
  feed = allFeeds[currentDate];
  const hasContent = b => (boardBlock(b, currentDate)?.items?.length || 0) > 0;
  if (!hasContent(currentBoard)) currentBoard = BOARD_ORDER.find(hasContent) || currentBoard;
  renderAll();
}
function renderAll() { renderTabs(); renderBody(); }

const themeBtn = document.getElementById('theme-toggle');
const storedTheme = localStorage.getItem('theme');
if (storedTheme === 'dark' || (!storedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');
themeBtn.addEventListener('click', () => {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
});
const searchInput = document.getElementById('search');
const searchClear = document.getElementById('search-clear');
function applySearch(value) {
  searchQuery = (value || '').trim();
  searchInput.value = searchQuery;
  searchClear.classList.toggle('hidden', !searchQuery);
  renderAll();
}
searchInput.addEventListener('input', e => applySearch(e.target.value));
searchClear.addEventListener('click', () => applySearch(''));

renderDateSelect();
loadAllFeeds().catch(err => {
  document.getElementById('feed-body').append(el('p', 'oai-card rounded-3xl p-10 text-center text-[color:var(--muted)]', `加载失败：${err.message}`));
});
</script>
</body>
</html>
