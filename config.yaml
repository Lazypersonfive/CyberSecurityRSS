# CyberSecurityRSS — Multi-board Configuration

# Discord webhook (legacy, unused by digest_pipeline / site workflow)
discord_webhook_url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"

# Legacy single-board defaults (kept for backward compat with main.py)
fetch_hours: 24
fetch_timeout: 10
max_per_category: 30
use_opml_cache: true

# --- Deterministic final-score policy ----------------------------------
# LLM 给出内容价值分；source/kind/freshness 由代码重算 final_score，避免把所有编辑策略塞进 prompt。
scoring:
  default:
    source_bonus:
      t1: 1.0
      t1_5: 0.5
      t2: 0.0
      unknown: -0.3
    kind_bonus:
      official: 0.5
      official_x: 0.3
      expert: 0.2
      expert_x: 0.2
      cn_official: 0.5
      cn_expert: 0.3
      google_news: -1.0
      community: -0.5
    freshness_bonus:
      within_12h: 0.3
      within_24h: 0.1
    cn_visibility_bonus:
      # 只奖励登记过的高质量中文源，不按生成的中文标题/摘要加分。
      bonus: 0.3
      kinds: [cn_official, cn_expert]
      tiers: [t1, t1_5, t2]
  boards:
    security:
      dimension_weights:
        relevance: 0.25
        technical_depth: 0.25
        exploitability: 0.20
        impact_scope: 0.20
        actionability: 0.10
    ai_security:
      kind_bonus:
        google_news: -1.2
      dimension_weights:
        security_relevance: 0.30
        technical_depth: 0.25
        practical_risk: 0.20
        agent_model_relevance: 0.15
        actionability: 0.10
    ai:
      kind_bonus:
        google_news: -1.6
        official_x: 0.4
        expert_x: 0.3
      dimension_weights:
        relevance: 0.20
        novelty: 0.25
        entity_importance: 0.20
        developer_relevance: 0.20
        ecosystem_impact: 0.15
    finance:
      dimension_weights:
        relevance: 0.25
        institution_importance: 0.25
        technology_depth: 0.20
        market_or_regulatory_impact: 0.20
        actionability: 0.10

# --- Multi-board config -------------------------------------------------
# Each board maps to a local OPML file + fetch window + curated top_n.
# display_name is what shows up in the site tabs.
boards:
  security:
    display_name: "安全"
    opml: feeds/security.opml
    fetch_hours: 72       # 覆盖国内公众号/官方通告的前两日发布，避免中文漏洞分析错过候选池
    dedup_lookback_days: 0 # 质量优先：72h 窗口内昨天抓过但未入选的中文技术文不能提前过滤
    delivered_lookback_days: 7 # 已展示条目单独去重；不影响昨日未入选候选继续参选
    max_entries: 120      # 安全板块中文源多且更新分散，需保留更大候选池
    llm_max_entries: 120
    # Synthesis 分类有 190+ feed 共享一个 cap；30（旧默认）会让北京白天发布的
    # 公众号文章被贴近 UTC 抓取时间的英文文章按时间序挤光 → 中文 7 天 0 raw。
    max_per_category: 150
    max_per_feed: 6       # 防 Vulners/Pentesting 这类 firehose 单源吃掉整个分类 cap
    top_n: 15
    score_threshold: 6
    fill_score_floor: 4  # 质量优先但给中文漏洞/攻防技术源更多进入 reserve 的机会
    source_policy:
      # security editorial target: 15 条里至少 6 条中文技术源（候选足够时）
      min_chinese: 6
      min_direct: 12
      max_google_news: 1
      max_aggregator: 7   # XSignals 可占到约一半；Google News 仍单独压低
      max_per_source: 4
    source_caps:
      bleepingcomputer.com: 3
      thehackernews.com: 3
      vulners.com: 3
      infosecwriteups.com: 2
      arstechnica.com: 1
      cisa.gov: 8
      simonwillison.net: 2
      reddit.com: 2
  ai_security:
    display_name: "AI 安全"
    opml: feeds/ai_security.opml
    fetch_hours: 72
    dedup_lookback_days: 0 # 稀疏板块不做跨日 raw 去重，避免候选池被 archive 吃空
    delivered_lookback_days: 7
    max_entries: 90
    llm_max_entries: 90
    max_per_category: 60
    max_per_feed: 8       # Google News AI Security 周产 160+，截最新 8 条足够
    top_n: 10
    score_threshold: 6
    fill_score_floor: 5  # 5 分技术分析可补位；泛 AI/营销项已被确定性规则压到 4 分以下
    source_policy:
      min_chinese: 2
      min_direct: 4
      max_google_news: 2
      max_aggregator: 5   # XSignals 最多约半数；Google News 仍单独压低
      max_per_source: 3
      min_final_score: 5.0
      allow_cap_relaxation: true
      relax_aggregate_caps: false # 稀疏日可放开单源 cap，但不能突破 Google News / 聚合源上限
    source_caps:
      news.google.com: 4
      openai.com: 3
      simonwillison.net: 3
  ai:
    display_name: "AI 前沿"
    opml: feeds/ai.opml
    fetch_hours: 48  # AI 前沿源更新抖动大；48h 保证稀疏日仍能满额
    dedup_lookback_days: 0 # 48h 质量窗口内不要被前日 archive 吃掉高价值 X/官网候选
    delivered_lookback_days: 7
    max_entries: 80
    llm_max_entries: 80
    max_per_category: 60
    max_per_feed: 10      # arXiv cs.AI 周产 180+，X 高频账号 40+；截最新 10 条
    top_n: 15
    score_threshold: 6
    fill_score_floor: 4
    source_policy:
      min_chinese: 5
      min_direct: 6
      max_google_news: 3
      max_aggregator: 7   # XSignals 最多约半数；Google News 仍单独压低
      max_per_source: 4
      allow_cap_relaxation: true  # 稀疏日松开 max_per_source 把 top_n 填满
      relax_aggregate_caps: false # 仍保持 Google News / 聚合源上限，避免稀疏日反向刷屏
    source_caps:
      arxiv.org: 2      # AI 前沿最多保留 2 条论文，避免日报被 arXiv 刷屏
      technologyreview.com: 4
      theverge.com: 4
      techcrunch.com: 3
      news.google.com: 6  # Google News 只做覆盖补充，不做主体来源
  finance:
    display_name: "金融科技"
    opml: feeds/finance.opml
    fetch_hours: 336  # 官方 IR 低频（Visa ~1.5 周、MC 月更、Amex 季更），14 天窗口保证 Card Networks 有量
    delivered_lookback_days: 14
    max_entries: 30
    llm_max_entries: 30
    max_per_category: 40
    max_per_feed: 10      # 14 天窗口下 Google News 金融 query 周产 200+，必须截
    top_n: 10
    score_threshold: 5
    fill_score_floor: 4
    source_policy:
      min_chinese: 1
      min_direct: 7
      min_official: 2
      max_google_news: 4
      max_aggregator: 4
      max_per_source: 4
      allow_cap_relaxation: true
    source_caps:
      pymnts.com: 3
      finextra.com: 3
      bankingdive.com: 4
      paymentsdive.com: 4
      news.google.com: 5

# Site
site:
  title: "每日科技情报"
  subtitle: "安全 · AI安全 · AI · 金融科技 — LLM 精选日报"
  lookback_days: 7
