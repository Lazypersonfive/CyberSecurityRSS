name: daily-digest

on:
  schedule:
    # 01:00 UTC = 09:00 CST every day
    - cron: "0 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write  # needed to push docs/ + digest/ back to main

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic feedparser httpx pyyaml jinja2

      - name: Fetch + digest all boards
        run: |
          for board in security ai finance; do
            echo "::group::Fetch $board"
            python fetch_and_save.py --board "$board"
            echo "::endgroup::"
            echo "::group::Digest $board"
            python digest_pipeline.py --board "$board"
            echo "::endgroup::"
          done

      - name: Build site
        run: python site_builder.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ digest/ output/ archive/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(daily): refresh digest for $(date -u +'%Y-%m-%d')"
            git push
          fi
