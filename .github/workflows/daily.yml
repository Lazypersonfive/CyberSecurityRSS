name: daily-digest

on:
  schedule:
    # 22:45 UTC = 06:45 CST; GitHub schedule queue usually lands around 07:00-07:30 CST.
    - cron: "45 22 * * *"
  workflow_dispatch:
    inputs:
      board:
        description: "Board to refresh"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - security
          - ai_security
          - ai
          - finance

permissions:
  contents: write  # needed to push docs/ + digest/ back to main

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
      LLM_BACKEND: ${{ vars.LLM_BACKEND || 'gemini' }}
      # Optional: point RSSHub XSignals at a private instance configured with
      # TWITTER_AUTH_TOKEN. Empty means keep the OPML default (rsshub.app).
      RSSHUB_BASE_URL: ${{ vars.RSSHUB_BASE_URL }}
      BOARD_SELECTION: ${{ inputs.board || 'all' }}
      GEMINI_REQUEST_TIMEOUT_SEC: ${{ vars.GEMINI_REQUEST_TIMEOUT_SEC || '90' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve digest date
        run: echo "DIGEST_DATE=$(TZ=Asia/Shanghai date +'%Y-%m-%d')" >> "$GITHUB_ENV"

      - name: Start RSSHub for X signals
        env:
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
        run: |
          if [ -n "$RSSHUB_BASE_URL" ]; then
            echo "Using configured RSSHUB_BASE_URL=$RSSHUB_BASE_URL"
            exit 0
          fi
          if [ -z "$TWITTER_AUTH_TOKEN" ]; then
            echo "TWITTER_AUTH_TOKEN is not configured; XSignals will fall back to OPML default."
            exit 0
          fi

          docker run -d --name rsshub -p 1200:1200 \
            -e CACHE_TYPE=memory \
            -e CACHE_EXPIRE=1800 \
            -e TWITTER_AUTH_TOKEN="$TWITTER_AUTH_TOKEN" \
            diygod/rsshub:chromium-bundled

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:1200/ >/dev/null; then
              echo "RSSHUB_BASE_URL=http://127.0.0.1:1200" >> "$GITHUB_ENV"
              echo "RSSHub is ready at http://127.0.0.1:1200"
              exit 0
            fi
            sleep 2
          done

          docker logs rsshub --tail 100
          echo "RSSHub did not become ready in time."
          exit 1

      - name: Fetch + digest all boards
        run: |
          set +e
          boards="security ai_security ai finance"
          if [ "$BOARD_SELECTION" != "all" ]; then
            boards="$BOARD_SELECTION"
          fi
          failed=0
          for board in $boards; do
            echo "::group::Fetch $board"
            timeout 8m python fetch_and_save.py --board "$board"
            fetch_status=$?
            echo "::endgroup::"
            if [ "$fetch_status" -ne 0 ]; then
              echo "::error::Fetch failed for $board with status $fetch_status"
              failed=1
              continue
            fi
            echo "::group::Digest $board"
            timeout 15m python digest_pipeline_gemini.py --board "$board"
            digest_status=$?
            echo "::endgroup::"
            if [ "$digest_status" -ne 0 ]; then
              echo "::error::Digest failed for $board with status $digest_status"
              failed=1
            fi
          done
          echo "PIPELINE_FAILED=$failed" >> "$GITHUB_ENV"

      - name: Build site
        if: env.BOARD_SELECTION == 'all'
        run: python site_builder.py

      - name: Build source audit
        if: env.BOARD_SELECTION == 'all'
        run: python source_audit.py

      - name: Build offline eval
        if: env.BOARD_SELECTION == 'all'
        run: python eval_strategy.py

      - name: Build feedback eval
        if: env.BOARD_SELECTION == 'all'
        run: python feedback_eval.py --days 14

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for d in docs digest output archive reports; do
            [ -d "$d" ] && git add "$d"
          done
          git status --short
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(daily): refresh digest for $DIGEST_DATE"
            git push
          fi

      - name: Fail if any board failed
        if: env.PIPELINE_FAILED == '1'
        run: exit 1
