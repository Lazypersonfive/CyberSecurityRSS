name: daily-digest

on:
  schedule:
    # 22:45 UTC = 06:45 CST; GitHub schedule queue usually lands around 07:00-07:30 CST.
    - cron: "45 22 * * *"
  workflow_dispatch:
    inputs:
      board:
        description: "Board to refresh"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - security
          - ai
          - finance

permissions:
  contents: write  # needed to push docs/ + digest/ back to main

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      LLM_BACKEND: ${{ vars.LLM_BACKEND || 'gemini' }}
      BOARD_SELECTION: ${{ inputs.board || 'all' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pick digest script
        id: pick
        run: |
          if [ "$LLM_BACKEND" = "anthropic" ]; then
            echo "script=digest_pipeline.py" >> "$GITHUB_OUTPUT"
          else
            echo "script=digest_pipeline_gemini.py" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve digest date
        run: echo "DIGEST_DATE=$(TZ=Asia/Shanghai date +'%Y-%m-%d')" >> "$GITHUB_ENV"

      - name: Fetch + digest all boards
        run: |
          boards="security ai finance"
          if [ "$BOARD_SELECTION" != "all" ]; then
            boards="$BOARD_SELECTION"
          fi
          for board in $boards; do
            echo "::group::Fetch $board"
            python fetch_and_save.py --board "$board"
            echo "::endgroup::"
            echo "::group::Digest $board"
            python "${{ steps.pick.outputs.script }}" --board "$board"
            echo "::endgroup::"
          done

      - name: Build site
        run: python site_builder.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for d in docs digest output archive reports; do
            [ -d "$d" ] && git add "$d"
          done
          git status --short
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(daily): refresh digest for $DIGEST_DATE"
            git push
          fi
