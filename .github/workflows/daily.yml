name: daily-digest

on:
  schedule:
    # 23:15 UTC = 07:15 CST every day
    - cron: "15 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write  # needed to push docs/ + digest/ back to main

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      LLM_BACKEND: ${{ vars.LLM_BACKEND || 'gemini' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic google-genai feedparser httpx pyyaml jinja2

      - name: Pick digest script
        id: pick
        run: |
          if [ "$LLM_BACKEND" = "anthropic" ]; then
            echo "script=digest_pipeline.py" >> "$GITHUB_OUTPUT"
          else
            echo "script=digest_pipeline_gemini.py" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch + digest all boards
        run: |
          for board in security ai finance; do
            echo "::group::Fetch $board"
            python fetch_and_save.py --board "$board"
            echo "::endgroup::"
            echo "::group::Digest $board"
            python "${{ steps.pick.outputs.script }}" --board "$board"
            echo "::endgroup::"
          done

      - name: Build site
        run: python site_builder.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ digest/ output/ archive/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(daily): refresh digest for $(date -u +'%Y-%m-%d')"
            git push
          fi
